version: "3.9"

services:
  manosquehablan:
    container_name: manosquehablan
    image: manosquehablan:latest
    restart: unless-stopped
    ports:
      - "8011:8011"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
    volumes:
      - ./data/results:/app/app/static/results
      - ./data/uploads:/app/app/static/uploads
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8011
      --http h11
      --log-level debug
