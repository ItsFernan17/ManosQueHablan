version: "3.9"

services:
  manosquehablan:
    container_name: manosquehablan
    image: manosquehablan:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
    volumes:
      - ./data/results:/app/app/static/results
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --http h11
      --log-level debug
      --timeout-keep-alive 300
      --timeout-graceful-shutdown 300
